                        <div className="contact-modal">
                            <p style={{fontWeight:'bold'}}>Contact the creator</p>
                            {wishData?.facebook && <a href={wishData.facebook} target="_blank" rel="noreferrer"><i className="fab fa-facebook"></i> Facebook</a>}
                            {wishData?.instagram && <a href={wishData.instagram} target="_blank" rel="noreferrer"><i className="fab fa-instagram"></i> Instagram</a>}
                            <button onClick={() => setOpen(false)} className="logout-btn">Close</button>
                        </div>
                    )}
                </>
            );
        }

        function LoginPage() {
            const navigate = useNavigate();
            const login = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                    navigate('/dashboard');
                } catch (e) {
                    alert('Login failed: ' + e.message);
                }
            };
            return (
                <div>
                    <video className="video-bg" autoPlay muted loop playsInline>
                        <source src="https://assets.mixkit.co/videos/preview/mixkit-candles-in-the-dark-1327-large.mp4" type="video/mp4" />
                    </video>
                    <div className="overlay"></div>
                    <div className="login-container">
                        <h1 style={{color:'white', marginBottom:'20px'}}>Create Your Own Birthday Wish Page</h1>
                        <button className="login-btn" onClick={login}>
                            <i className="fab fa-google"></i> Login with Google
                        </button>
                    </div>
                </div>
            );
        }

        function Dashboard() {
            const navigate = useNavigate();
            const [form, setForm] = useState({
                birthdayName: 'Natu..',
                month: 2, day: 15, hour: 0, minute: 0,
                age: 17,
                greetingText: "Hey You Know What! You're the most adorable human i ever met! 💖",
                reasons: [
                    { text: "You're such a kind and wonderful person...", emoji: "🌟" },
                    { text: "May your day be filled with love...", emoji: "💗" },
                    { text: "Wishing you success...", emoji: "💕" },
                    { text: "Stay the amazing girl you are...", emoji: "🌟" }
                ],
                photos: [
                    { url: "https://res.cloudinary.com/dpctt0wao/image/upload/v1773499479/whatistime_web_1024_qjits5.jpg", date: "What is time", caption: "This day marks..." },
                    { url: "https://res.cloudinary.com/dpctt0wao/image/upload/v1773476394/1763024498529_wgoq2u.jpg", date: "Her Smile", caption: "You're truly..." },
                ],
                videos: [
                    { title: "Happy Birthday Sweety❤️🎂", url: "https://res.cloudinary.com/dpctt0wao/video/upload/v1773477829/WhatsApp_Video_2026-03-14_at_2.41.14_PM_n2zc1z.mp4" },
                    { title: "When she sings...", url: "https://res.cloudinary.com/dpctt0wao/video/upload/v1773477827/WhatsApp_Video_2026-03-14_at_2.41.15_PM_hcyu15.mp4" }
                ],
                countdownAudio: "https://res.cloudinary.com/dpctt0wao/video/upload/v1773211012/WhatsApp_Audio_2026-03-11_at_12.33.50_PM_jhzjmt.mp3",
                wishAudio: "https://res.cloudinary.com/dpctt0wao/video/upload/v1773210114/WhatsApp_Audio_2026-03-10_at_11.46.39_PM_cbggem.mp3",
                letter: "Every laugh, every chat...",
                secretPhoto: "https://res.cloudinary.com/dpctt0wao/image/upload/v1773163463/WhatsApp_Image_2026-03-10_at_11.18.34_PM_nc8tpd.jpg",
                facebook: "https://www.facebook.com/rafahimn",
                instagram: "https://www.instagram.com/rafahimn",
                contactPhoto: "https://res.cloudinary.com/dpctt0wao/image/upload/v1773163463/WhatsApp_Image_2026-03-10_at_11.18.34_PM_nc8tpd.jpg"
            });
            const [saving, setSaving] = useState(false);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setForm(prev => ({ ...prev, [name]: value }));
            };

            const uploadWidget = (callback) => {
                window.cloudinary.openUploadWidget(
                    {
                        cloudName: CLOUDINARY_CLOUD_NAME,
                        uploadPreset: CLOUDINARY_UPLOAD_PRESET,
                        sources: ['local', 'url'],
                        multiple: false,
                    },
                    (error, result) => {
                        if (!error && result && result.event === "success") {
                            callback(result.info.secure_url);
                        }
                    }
                );
            };

            const handleSubmit = async () => {
                if (!auth.currentUser) {
                    alert('Please login first');
                    return;
                }
                setSaving(true);
                try {
                    const wishId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
                    await db.collection('wishes').doc(wishId).set({
                        ...form,
                        userId: auth.currentUser.uid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    navigate(`/wish/${wishId}`);
                } catch (err) {
                    alert('Error saving: ' + err.message);
                } finally {
                    setSaving(false);
                }
            };

            const logout = () => {
                auth.signOut();
                navigate('/');
            };

            return (
                <div style={{ padding: '20px', maxWidth: '800px', margin: '0 auto' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <h1>Customize Your Birthday Wish Page</h1>
                        <button className="logout-btn" onClick={logout}>Logout</button>
                    </div>
                    <div className="form-container">
                        <div className="form-group"><label>Birthday Person's Name</label><input name="birthdayName" value={form.birthdayName} onChange={handleChange} /></div>
                        <div className="form-group"><label>Birth Date</label><input type="date" onChange={e => { const d = new Date(e.target.value); setForm(prev => ({...prev, month: d.getMonth(), day: d.getDate()})); }} /><input type="time" onChange={e => { const [h,m] = e.target.value.split(':'); setForm(prev => ({...prev, hour: parseInt(h), minute: parseInt(m)})); }} /></div>
                        <div className="form-group"><label>Age (Candles)</label><input type="number" name="age" value={form.age} onChange={e => setForm(prev => ({...prev, age: parseInt(e.target.value)}))} /></div>
                        <div className="form-group"><label>Greeting Message</label><textarea name="greetingText" value={form.greetingText} onChange={handleChange} /></div>
                        <div className="form-group"><label>4 Reasons (emoji text per line)</label><textarea onChange={e => { const lines = e.target.value.split('\n').filter(l=>l.trim()); const newReasons = lines.map(line => { const parts = line.trim().split(' '); const emoji = parts[0]; const text = parts.slice(1).join(' '); return { emoji: emoji || '💖', text: text || line }; }); if (newReasons.length <= 4) setForm(prev => ({...prev, reasons: newReasons})); }} defaultValue={form.reasons.map(r => r.emoji + ' ' + r.text).join('\n')} /></div>
                        <div className="form-group"><label>Photos (url:date:caption, comma separated)</label><textarea onChange={e => { const items = e.target.value.split(',').map(item => { const parts = item.split(':'); return { url: parts[0]?.trim(), date: parts[1]?.trim(), caption: parts[2]?.trim() }; }); setForm(prev => ({...prev, photos: items})); }} defaultValue={form.photos.map(p => `${p.url}:${p.date}:${p.caption}`).join(',')} /><button onClick={() => uploadWidget(url => setForm(prev => ({...prev, photos: [...prev.photos, { url, date: 'New Memory', caption: 'Caption' }] })))}>Upload Photo</button></div>
                        <div className="form-group"><label>Videos (url:title, comma separated)</label><textarea onChange={e => { const items = e.target.value.split(',').map(item => { const [url, title] = item.split(':'); return { url: url?.trim(), title: title?.trim() || 'Video' }; }); setForm(prev => ({...prev, videos: items})); }} defaultValue={form.videos.map(v => `${v.url}:${v.title}`).join(',')} /></div>
                        <div className="form-group"><label>Countdown Audio URL</label><input name="countdownAudio" value={form.countdownAudio} onChange={handleChange} /></div>
                        <div className="form-group"><label>Birthday Wish Audio URL</label><input name="wishAudio" value={form.wishAudio} onChange={handleChange} /></div>
                        <div className="form-group"><label>Love Letter</label><textarea name="letter" value={form.letter} onChange={handleChange} /></div>
                        <div className="form-group"><label>Secret Photo URL</label><input name="secretPhoto" value={form.secretPhoto} onChange={handleChange} /><button onClick={() => uploadWidget(url => setForm(prev => ({...prev, secretPhoto: url})))}>Upload</button></div>
                        <div className="form-group"><label>Facebook Profile</label><input name="facebook" value={form.facebook} onChange={handleChange} /></div>
                        <div className="form-group"><label>Instagram Profile</label><input name="instagram" value={form.instagram} onChange={handleChange} /></div>
                        <div className="form-group"><label>Contact Icon Photo URL</label><input name="contactPhoto" value={form.contactPhoto} onChange={handleChange} /><button onClick={() => uploadWidget(url => setForm(prev => ({...prev, contactPhoto: url})))}>Upload</button></div>
                        <button className="submit-btn" onClick={handleSubmit} disabled={saving}>{saving ? 'Creating...' : 'Create My Wish Page'}</button>
                    </div>
                </div>
            );
        }

        function WishPage() {
            const { wishId } = useParams();
            const [wishData, setWishData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentStep, setCurrentStep] = useState('countdown');
            const countdownAudioRef = useRef(null);
            const wishAudioRef = useRef(null);

            useEffect(() => {
                db.collection('wishes').doc(wishId).get().then(doc => {
                    if (doc.exists) setWishData(doc.data());
                    else alert('Invalid wish page');
                }).catch(() => alert('Error loading')).finally(() => setLoading(false));
            }, [wishId]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const container = document.querySelector('.floating-elements');
                    if (!container) return;
                    const els = ['🦋','🌸','🌼','🌺'];
                    const el = document.createElement('div');
                    el.className = 'float-item ' + (Math.random() > 0.5 ? 'butterfly' : 'flower');
                    el.textContent = els[Math.floor(Math.random() * els.length)];
                    el.style.left = Math.random() * 100 + '%';
                    el.style.animationDelay = Math.random() * 5 + 's';
                    el.style.fontSize = (Math.random() * 1.5 + 1.5) + 'rem';
                    container.appendChild(el);
                    setTimeout(() => el.remove(), 15000);
                }, 2000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (!wishData) return;
                const timer = setInterval(() => {
                    const now = new Date();
                    const birthday = new Date(now.getFullYear(), wishData.month, wishData.day, wishData.hour, wishData.minute);
                    if (now >= birthday) { setCurrentStep('greeting'); clearInterval(timer); }
                }, 1000);
                return () => clearInterval(timer);
            }, [wishData]);

            useEffect(() => {
                if (currentStep === 'countdown' && wishData?.countdownAudio) {
                    countdownAudioRef.current = new Audio(wishData.countdownAudio);
                    countdownAudioRef.current.play().catch(() => {});
                }
                if (currentStep !== 'countdown' && countdownAudioRef.current) { countdownAudioRef.current.pause(); countdownAudioRef.current = null; }
                if (currentStep === 'greeting' && wishData?.wishAudio) {
                    wishAudioRef.current = new Audio(wishData.wishAudio);
                    wishAudioRef.current.play().catch(() => {});
                }
            }, [currentStep, wishData]);

            if (loading) return <div style={{textAlign:'center', marginTop:'100px'}}>Loading...</div>;
            if (!wishData) return <div style={{textAlign:'center', marginTop:'100px'}}>Invalid wish page</div>;

            const openLightbox = (src) => { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('show'); };
            const closeLightbox = () => document.getElementById('lightbox').classList.remove('show');

            return (
                <div>
                    <ContactFloatingButton wishData={wishData} />
                    <div className="floating-elements"></div>
                    <div className="magic-sparkles"></div>
                    <div className="floating-hearts" id="floatingHearts"></div>
                    <div id="lightbox" className="lightbox" onClick={closeLightbox}><span className="close">&times;</span><img id="lightboxImg" src="" alt="lightbox" /></div>

                    {currentStep === 'countdown' && <CountdownContent wishData={wishData} />}
                    {currentStep === 'greeting' && (
                        <div className="greeting-screen show">
                            <h1>Happy Birthday {wishData.birthdayName} ❤️🎂💫</h1>
                            <div className="greeting-text">{wishData.greetingText}</div>
                            <button className="enter-btn" onClick={() => setCurrentStep('cake')}>Click to enter your world 💕</button>
                        </div>
                    )}
                    {currentStep === 'cake' && <CakeScreen wishData={wishData} onNext={() => setCurrentStep('reasons')} />}
                    {currentStep === 'reasons' && <ReasonsScreen wishData={wishData} onNext={() => setCurrentStep('photo')} />}
                    {currentStep === 'photo' && <PhotoScreen wishData={wishData} openLightbox={openLightbox} onNext={() => setCurrentStep('video')} />}
                    {currentStep === 'video' && <VideoScreen wishData={wishData} onNext={() => setCurrentStep('letter')} />}
                    {currentStep === 'letter' && <LetterScreen wishData={wishData} onNext={() => setCurrentStep('secret')} />}
                    {currentStep === 'secret' && <SecretScreen wishData={wishData} openLightbox={openLightbox} />}
                </div>
            );
        }

        function CountdownContent({ wishData }) {
            const [time, setTime] = useState({ days:0, hours:0, mins:0, secs:0 });
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    const birthday = new Date(now.getFullYear(), wishData.month, wishData.day, wishData.hour, wishData.minute);
                    if (now >= birthday) return;
                    const diff = birthday - now;
                    setTime({
                        days: Math.floor(diff / (1000*60*60*24)),
                        hours: Math.floor((diff / (1000*60*60)) % 24),
                        mins: Math.floor((diff / (1000*60)) % 60),
                        secs: Math.floor((diff / 1000) % 60)
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, [wishData]);
            return (
                <div className="countdown-screen" style={{display:'flex'}}>
                    <h1 className="countdown-title">Wait for countdown Please...⌛</h1>
                    <div className="countdown-box">
                        <div className="count-item"><span className="count-number">{String(time.days).padStart(2,'0')}</span><span className="count-label">Days</span></div>
                        <div className="count-item"><span className="count-number">{String(time.hours).padStart(2,'0')}</span><span className="count-label">Hours</span></div>
                        <div className="count-item"><span className="count-number">{String(time.mins).padStart(2,'0')}</span><span className="count-label">Mins</span></div>
                        <div className="count-item"><span className="count-number">{String(time.secs).padStart(2,'0')}</span><span className="count-label">Secs</span></div>
                    </div>
                    <div className="countdown-message">⏰ Time-lap at {wishData.day} {['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][wishData.month]} {wishData.hour}:{String(wishData.minute).padStart(2,'0')}</div>
                </div>
            );
        }

        function CakeScreen({ wishData, onNext }) {
            const [cut, setCut] = useState(false);
            const [blown, setBlown] = useState(0);
            const total = wishData.age;
            useEffect(() => {
                let interval;
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const analyser = audioCtx.createAnalyser();
                    const source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    analyser.fftSize = 256;
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    interval = setInterval(() => {
                        if (cut || blown >= total) return;
                        analyser.getByteFrequencyData(dataArray);
                        if (dataArray.reduce((a,b)=>a+b,0)/dataArray.length > 50) {
                            setBlown(prev => { const newB = Math.min(prev+2, total); if (newB === total) confetti({ particleCount:100, spread:70 }); return newB; });
                        }
                    }, 150);
                }).catch(() => {});
                return () => { if (interval) clearInterval(interval); };
            }, [cut, total]);
            const blowCandle = (i) => { if (!cut && i >= blown) { setBlown(i+1); confetti({ particleCount:5, spread:30 }); } };
            return (
                <div className="cake-screen show">
                    <div className="cake-container">
                        <div className="cake-emoji">{cut ? '🍰' : '🎂'}</div>
                        <div className="candles">{Array.from({length: total}).map((_,i)=>(<span key={i} className={`candle ${i<blown?'blown':''}`} onClick={()=>blowCandle(i)}>🕯️</span>))}</div>
                        <div className="cake-status">{cut ? '🎉 Cake cut! Happy Birthday! 🎉' : `${total-blown} candles burning - Blow or tap`}</div>
                        {!cut && <button className="cut-btn" disabled={blown !== total} onClick={()=>{ setCut(true); confetti({ particleCount:150, spread:80 }); }}>🍰 Cut Cake</button>}
                        {cut && <button className="cake-next-btn" onClick={onNext}>Enter your storyline 💫</button>}
                    </div>
                </div>
            );
        }

        function ReasonsScreen({ wishData, onNext }) {
            const [index, setIndex] = useState(0);
            const reasons = wishData.reasons || [];
            if (!reasons.length) { useEffect(() => { setTimeout(onNext, 100); }, []); return null; }
            const handleClick = () => index < reasons.length-1 ? setIndex(index+1) : onNext();
            const r = reasons[index];
            return (
                <div className="reasons-screen show">
                    <div className="reasons-header"><h1>Happy Birthday {wishData.birthdayName}.. 💖</h1></div>
                    <div className="reasons-container"><div className="reason-card"><div className="reason-text">{r.emoji} {r.text}</div><div className="reason-emoji">{r.emoji}</div></div></div>
                    <div className="reason-counter">Reason {index+1} of {reasons.length}</div>
                    <button className={`reasons-btn ${index===reasons.length-1?'story-mode':''}`} onClick={handleClick}>{index===reasons.length-1 ? "You're the BESTEST ! 💖" : "Click Here... 💕"}</button>
                </div>
            );
        }

        function PhotoScreen({ wishData, openLightbox, onNext }) {
            return (
                <div className="photo-screen show">
                    <div className="photo-header"><h1>Our Beautiful Moments Together</h1><p>Every moment spent with you has been magical...</p></div>
                    <div className="photo-container">{wishData.photos?.map((p,i)=>(<div key={i} className="photo-card" onClick={()=>openLightbox(p.url)}><img src={p.url} className="photo-img"/><div className="photo-date">{p.date}</div><div className="photo-caption">{p.caption}</div></div>))}</div>
                    <button className="photo-next-btn" onClick={onNext}>Again Your Storylane 🎥</button>
                </div>
            );
        }

        function VideoScreen({ wishData, onNext }) {
            return (
                <div className="video-screen show">
                    <h2>A Special Video Message</h2>
                    <div className="video-container"><div className="video-grid">{wishData.videos?.map((v,i)=>(<div key={i} className="video-card"><h3>{v.title}</h3><div className="video-wrapper"><video controls><source src={v.url} type="video/mp4"/></video></div></div>))}</div>
                    <button className="video-next-btn" onClick={onNext}>See your letter 💌</button></div>
                </div>
            );
        }

        function LetterScreen({ wishData, onNext }) {
            return (
                <div className="letter-screen show">
                    <div className="letter-container"><h2>A Letter for You Babiee 💌</h2><div className="letter-content">{wishData.letter}</div><button className="letter-return-btn" onClick={onNext}>Again, Happy Birthday My Honey</button></div>
                </div>
            );
        }

        function SecretScreen({ wishData, openLightbox }) {
            return (
                <div className="secret-screen show">
                    <div className="secret-container"><img src={wishData.secretPhoto} className="secret-photo" onClick={()=>openLightbox(wishData.secretPhoto)}/><p style={{marginTop:'20px', fontWeight:'bold'}}>With love, {wishData.birthdayName}</p>
                    <button className="soulmate-btn" onClick={()=>window.open(wishData.instagram||'https://instagram.com','_blank')}><i className="fab fa-instagram"></i> See Your Soulmate</button></div>
                </div>
            );
        }

        function App() {
            return (<HashRouter><Routes><Route path="/" element={<LoginPage />} /><Route path="/dashboard" element={<Dashboard />} /><Route path="/wish/:wishId" element={<WishPage />} /></Routes></HashRouter>);
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
