    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Quicksand',sans-serif; overflow-x:hidden; color:#4a4a4a; min-height:100vh; }
        .video-bg { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-2; filter:brightness(0.8); animation:slowZoom 20s infinite alternate; }
        @keyframes slowZoom { from{ transform:scale(1); } to{ transform:scale(1.05); } }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg, rgba(255,192,203,0.3), rgba(147,112,219,0.3)); z-index:-1; }

        .float-item { position:absolute; font-size:2rem; opacity:0.5; animation:simpleFloat 12s infinite ease-in-out; filter:drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        @keyframes simpleFloat { 0%{ transform:translate(0,100vh) rotate(0deg); opacity:0; } 20%{ opacity:0.8; transform:translate(15vw,80vh) rotate(15deg); } 50%{ transform:translate(40vw,50vh) rotate(30deg); } 80%{ opacity:0.8; transform:translate(70vw,20vh) rotate(15deg); } 100%{ transform:translate(90vw,-10vh) rotate(0deg); opacity:0; } }
        .butterfly { font-size:2.2rem; animation:flutter 2s infinite alternate ease-in-out; }
        @keyframes flutter { 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-8px) rotate(5deg); } }
        .flower { font-size:1.8rem; animation:spin 12s infinite linear; }
        @keyframes spin { from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
        .magic-sparkles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }
        .magic-sparkles::before, .magic-sparkles::after { content:''; position:absolute; width:100%; height:100%; background-image:radial-gradient(circle, white 1px, transparent 1px); background-size:50px 50px; animation:sparkleLayer 8s linear infinite; opacity:0.5; }
        .magic-sparkles::after { animation-delay:-4s; transform:rotate(45deg); }
        @keyframes sparkleLayer { 0%{ transform:translateY(0); } 100%{ transform:translateY(-50px); } }
        .floating-hearts { position:fixed; width:100%; height:100%; pointer-events:none; z-index:2; }
        .heart-float { position:absolute; font-size:1.5rem; color:rgba(255,105,180,0.6); animation:floatHeart var(--float-duration,6s) ease-in-out infinite; animation-delay:var(--delay,0s); }

        .contact-modal { position:fixed; bottom:80px; right:20px; background:rgba(255,255,255,0.95); backdrop-filter:blur(10px); border-radius:20px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.2); z-index:10000; display:flex; flex-direction:column; align-items:center; gap:10px; }
        .login-container { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:1; }
        .login-btn { background:white; color:#333; padding:12px 30px; border-radius:30px; font-size:18px; border:none; cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.2); transition:0.3s; display:inline-flex; align-items:center; gap:8px; }

        .countdown-screen { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; background:linear-gradient(135deg, rgba(255,209,220,0.4), rgba(230,230,250,0.4)); backdrop-filter:blur(8px); z-index:1000; text-align:center; padding:20px; }

        .greeting-screen { position:fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(-45deg,#fee9f7,#e8f5fe,#fef2e8,#f0ffe8); background-size:400% 400%; animation:gradientBG 15s ease infinite; z-index:900; padding:20px; text-align:center; }
        .greeting-screen.show { display:flex; }

        .cake-screen { position:fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); z-index:800; padding:20px; }
        .cake-screen.show { display:flex; }

        .cake-status { color:white; margin:15px 0; padding:10px; border-radius:30px; background:rgba(0,0,0,0.5); text-align:center; }
        .cut-btn { background:linear-gradient(45deg,gold,red); color:black; font-size:22px; padding:12px; border:none; border-radius:40px; font-weight:bold; cursor:pointer; width:100%; }
        .cut-btn:disabled { opacity:0.3; }
        .cake-next-btn { margin-top:15px; padding:12px 30px; background:linear-gradient(45deg,#9b6dff,#ff6dc7); border:none; border-radius:50px; color:white; font-size:1.2rem; cursor:pointer; }
        .reasons-screen, .photo-screen, .video-screen, .letter-screen, .secret-screen { position:fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:700; padding:20px; }
        .photo-screen.show, .video-screen.show, .letter-screen.show, .secret-screen.show, .reasons-screen.show { display:flex; }
        .photo-screen { overflow-y:auto; background:linear-gradient(135deg,#ffd1dc,#e6e6fa); justify-content:flex-start; padding-top:80px; }
        .photo-header h1 { font-family:'Dancing Script',cursive; font-size:3rem; color:#b0306e; text-align:center; }
        .photo-container { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:2rem; }
        .photo-card { background:rgba(255,255,255,0.9); border-radius:20px; padding:1.5rem; cursor:pointer; }
        .photo-img { width:100%; height:250px; object-fit:cover; border-radius:15px; }
        .photo-date { font-family:'Dancing Script',cursive; color:#c71585; font-size:1.3rem; }
        .photo-next-btn, .video-next-btn { margin:30px auto; padding:12px 30px; background:linear-gradient(45deg,#9b6dff,#ff6dc7); border:none; border-radius:50px; color:white; font-size:1.2rem; cursor:pointer; display:block; max-width:300px; text-align:center; }
        .video-screen { background:linear-gradient(135deg,#a8edea,#fed6e3); }
        .video-grid { display:grid; grid-template-columns:1fr; gap:30px; max-width:1200px; width:100%; }
        @media (min-width:768px) { .video-grid { grid-template-columns:repeat(2,1fr); } }
        .video-card { background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); border-radius:20px; padding:20px; }
        .video-wrapper { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:15px; }
        .video-wrapper video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
        .letter-screen { background:#fdfbfb; }
        .letter-container { max-width:600px; background:white; padding:2rem; border-radius:30px; text-align:center; }
        .letter-container h2 { font-family:'Dancing Script',cursive; font-size:2.5rem; color:#b0306e; }
        .letter-content { font-size:1.2rem; line-height:1.8; color:#2c3e50; white-space:pre-line; }
        .letter-return-btn, .soulmate-btn { margin-top:20px; padding:12px 30px; background:linear-gradient(45deg,#ff69b4,#ff99cc); border:none; border-radius:50px; color:white; font-size:1.2rem; cursor:pointer; display:inline-block; }
        .secret-screen { background:#ffe6f0; }
        .secret-container { max-width:600px; width:100%; background:rgba(255,255,255,0.85); backdrop-filter:blur(12px); padding:2rem; border-radius:40px; text-align:center; }
        .secret-photo { width:100%; max-height:400px; object-fit:cover; border-radius:30px; cursor:pointer; }
        .lightbox { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10001; justify-content:center; align-items:center; }
        .lightbox.show { display:flex; }
        .lightbox img { max-width:90%; max-height:90%; border-radius:10px; border:3px solid white; }
        .lightbox .close { position:absolute; top:20px; right:30px; font-size:40px; color:white; cursor:pointer; }
        .admin-table { width:100%; border-collapse:collapse; margin-top:20px; }
        .admin-table th { background:#ff69b4; color:white; padding:10px; }
        .admin-table td { padding:10px; border:1px solid #ddd; }

<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==================== CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyC18r8GPtooLmUBnOGRBQUIKOodPvHRX8o",
            authDomain: "birthday-website-33f71.firebaseapp.com",
            projectId: "birthday-website-33f71",
            storageBucket: "birthday-website-33f71.firebasestorage.app",
            messagingSenderId: "800374135757",
            appId: "1:800374135757:web:2b4a058f708972e3e10284",
            measurementId: "G-T3JH3J4N87"
        };
        const CLOUDINARY_CLOUD_NAME = "dpctt0wao";
        const CLOUDINARY_UPLOAD_PRESET = "birthday_upload";

        // Fixed contact info (your original)
        const ADMIN_CONTACT = {
            photo: "https://res.cloudinary.com/dpctt0wao/image/upload/v1773163463/WhatsApp_Image_2026-03-10_at_11.18.34_PM_nc8tpd.jpg",
            facebook: "https://www.facebook.com/rafahimn",
            instagram: "https://www.instagram.com/rafahimn"
        };
        // =================================================

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, useRef, createContext, useContext } = React;

        // ---------- Custom Hash Router ----------
        const RouterContext = createContext();
        function useHashRouter() {
            const [hash, setHash] = useState(window.location.hash.slice(1) || '/');
            useEffect(() => {
                const onHashChange = () => setHash(window.location.hash.slice(1) || '/');
                window.addEventListener('hashchange', onHashChange);
                return () => window.removeEventListener('hashchange', onHashChange);
            }, []);
            const navigate = (path) => { window.location.hash = path; };
            return { path: hash, navigate };
        }
        function Route({ path, element }) {
            const { path: currentPath } = useContext(RouterContext);
            if (path.includes(':')) {
                const regex = new RegExp('^' + path.replace(/:\w+/g, '([^/]+)') + '$');
                const match = currentPath.match(regex);
                if (match) {
                    const keys = [...path.matchAll(/:\w+/g)].map(m => m[0].slice(1));
                    const params = {};
                    keys.forEach((key, i) => { params[key] = match[i+1]; });
                    return element(params);
                }
                return null;
            }
            return currentPath === path ? element() : null;
        }

        // ---------- Floating Effects ----------
        function startFloatingHearts() {
            const interval = setInterval(() => {
                const container = document.querySelector('.floating-hearts');
                if (!container) return;
                const heart = document.createElement('div');
                heart.className = 'heart-float';
                heart.textContent = ['💖','💝','💗','💓','💕'][Math.floor(Math.random()*5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.setProperty('--float-duration', (Math.random() * 4 + 4) + 's');
                heart.style.setProperty('--delay', Math.random() * 3 + 's');
                heart.style.setProperty('--translate-x', (Math.random() * 60 - 30) + 'px');
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 8000);
            }, 800);
        }
        function startFloatingElements() {
            setInterval(() => {
                const container = document.querySelector('.floating-elements');
                if (!container) return;
                const el = document.createElement('div');
                el.className = 'float-item ' + (Math.random() > 0.5 ? 'butterfly' : 'flower');
                el.textContent = ['🦋','🌸','🌼','🌺'][Math.floor(Math.random()*4)];
                el.style.left = Math.random() * 100 + '%';
                el.style.setProperty('animation-delay', Math.random() * 5 + 's');
                el.style.fontSize = (Math.random() * 1.5 + 1.5) + 'rem';
                container.appendChild(el);
                setTimeout(() => el.remove(), 15000);
            }, 2000);
        }

        // ---------- Fixed Contact Button ----------
        function ContactFloatingButton() {
            const [open, setOpen] = useState(false);
            return (
                <>
                    <div className="contact-float-btn" onClick={() => setOpen(!open)}>
                        <img src={ADMIN_CONTACT.photo} alt="Contact" />
                    </div>
                    {open && (
                        <div className="contact-modal">
                            <p style={{fontWeight:'bold'}}>Contact</p>
                            <a href={ADMIN_CONTACT.facebook} target="_blank" rel="noreferrer"><i className="fab fa-facebook"></i> Facebook</a>
                            <a href={ADMIN_CONTACT.instagram} target="_blank" rel="noreferrer"><i className="fab fa-instagram"></i> Instagram</a>
                            <button onClick={() => setOpen(false)} className="logout-btn">Close</button>
                        </div>
                    )}
                </>
            );
        }

        // ---------- Cloudinary Upload Helper ----------
        function uploadToCloudinary(callback) {
            window.cloudinary.openUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: CLOUDINARY_UPLOAD_PRESET,
                sources: ['local', 'url', 'camera'],
                multiple: false,
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    callback(result.info.secure_url);
                }
            });
        }

        // ---------- Login Page ----------
        function LoginPage() {
            const { navigate } = useContext(RouterContext);
            const login = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                    navigate('/dashboard');
                } catch (e) {
                    alert('Login failed: ' + e.message);
                }
            };
            return (
                <div>
                    <video className="video-bg" autoPlay muted loop playsInline>
                        <source src="https://assets.mixkit.co/videos/preview/mixkit-candles-in-the-dark-1327-large.mp4" type="video/mp4" />
                    </video>
                    <div className="overlay"></div>
                    <div className="login-container">
                        <h1 style={{color:'white', marginBottom:'20px'}}>Create Your Own Birthday Wish Page</h1>
                        <button className="login-btn" onClick={login}>
                            <i className="fab fa-google"></i> Login with Google
                        </button>
                    </div>
                </div>
            );
        }

        // ---------- Dashboard (Only Uploads, No URLs) ----------
        function Dashboard() {
            const { navigate } = useContext(RouterContext);
            const [form, setForm] = useState({
                birthdayName: '',
                month: 2, day: 15, hour: 0, minute: 0,
                age: 17,
                greetingText: '',
                reasons: [{text:'',emoji:'💖'},{text:'',emoji:'💗'},{text:'',emoji:'💕'},{text:'',emoji:'🌟'}],
                photos: [],
                videos: [],
                countdownAudio: '',
                wishAudio: '',
                letter: '',
                secretPhoto: ''
            });
            const [saving, setSaving] = useState(false);
            const [preview, setPreview] = useState({photos:[], videos:[], secretPhoto:'', audio:''});

            const handleChange = (e) => {
                const { name, value } = e.target;
                setForm(prev => ({ ...prev, [name]: value }));
            };

            const addPhoto = (url) => {
                setForm(prev => ({...prev, photos: [...prev.photos, {url, date:'Memory', caption:''}] }));
                setPreview(prev => ({...prev, photos: [...prev.photos, url]}));
            };
            const addVideo = (url) => {
                setForm(prev => ({...prev, videos: [...prev.videos, {url, title:'Video'}] }));
                setPreview(prev => ({...prev, videos: [...prev.videos, url]}));
            };
            const setAudio = (url, type) => {
                setForm(prev => ({...prev, [type]: url}));
                setPreview(prev => ({...prev, audio: url}));
            };
            const setSecret = (url) => {
                setForm(prev => ({...prev, secretPhoto: url}));
                setPreview(prev => ({...prev, secretPhoto: url}));
            };

            const handleSubmit = async () => {
                if (!auth.currentUser) { alert('Please login first'); return; }
                if (!form.birthdayName.trim()) { alert('Please enter birthday person name'); return; }
                setSaving(true);
                try {
                    const wishId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
                    await db.collection('wishes').doc(wishId).set({
                        ...form,
                        userId: auth.currentUser.uid,
                        userEmail: auth.currentUser.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert('Wish page created! Link: ' + window.location.origin + window.location.pathname + '#/wish/' + wishId);
                    navigate(`/wish/${wishId}`);
                } catch (err) {
                    alert('Error: ' + err.message);
                } finally {
                    setSaving(false);
                }
            };

            return (
                <div style={{ padding: '20px', maxWidth: '800px', margin: '0 auto' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <h1>Customize Your Birthday Wish Page</h1>
                        <div>
                            <button className="logout-btn" style={{marginRight:'10px'}} onClick={() => navigate('/admin')}>Admin</button>
                            <button className="logout-btn" onClick={() => { auth.signOut(); navigate('/'); }}>Logout</button>
                        </div>
                    </div>
                    <div className="form-container">
                        <div className="form-group"><label>Birthday Person's Name *</label><input name="birthdayName" value={form.birthdayName} onChange={handleChange} placeholder="Enter name" /></div>
                        <div className="form-group"><label>Birth Date</label><input type="date" onChange={e => { const d = new Date(e.target.value); setForm(prev => ({...prev, month: d.getMonth(), day: d.getDate()})); }} /><input type="time" onChange={e => { const [h,m] = e.target.value.split(':'); setForm(prev => ({...prev, hour: parseInt(h)||0, minute: parseInt(m)||0})); }} /></div>
                        <div className="form-group"><label>Age (Number of Candles)</label><input type="number" name="age" value={form.age} onChange={e => setForm(prev => ({...prev, age: parseInt(e.target.value)||17}))} /></div>
                        <div className="form-group"><label>Greeting Message</label><textarea name="greetingText" value={form.greetingText} onChange={handleChange} placeholder="Your sweet message..." /></div>
                        
                        {/* Reasons */}
                        <div className="form-group"><label>4 Reasons (Emoji + Text)</label>
                            {form.reasons.map((r,i) => (
                                <div key={i} style={{display:'flex', gap:'5px', marginBottom:'5px'}}>
                                    <input style={{width:'50px'}} value={r.emoji} onChange={e => {
                                        const newR = [...form.reasons];
                                        newR[i].emoji = e.target.value;
                                        setForm(prev => ({...prev, reasons: newR}));
                                    }} />
                                    <input style={{flex:1}} value={r.text} onChange={e => {
                                        const newR = [...form.reasons];
                                        newR[i].text = e.target.value;
                                        setForm(prev => ({...prev, reasons: newR}));
                                    }} placeholder={"Reason "+(i+1)} />
                                </div>
                            ))}
                        </div>

                        {/* Photos Upload */}
                        <div className="form-group">
                            <label>Photos (Click to upload)</label>
                            <button type="button" onClick={() => uploadToCloudinary(addPhoto)}>📸 Upload Photo</button>
                            <div>{preview.photos.map((url,i) => <img key={i} src={url} className="upload-preview" />)}</div>
                            {form.photos.map((p,i) => (
                                <div key={i} style={{display:'flex', gap:'5px', marginTop:'5px'}}>
                                    <input style={{flex:1}} value={p.date} onChange={e => {
                                        const newP = [...form.photos];
                                        newP[i].date = e.target.value;
                                        setForm(prev => ({...prev, photos: newP}));
                                    }} placeholder="Date/Caption" />
                                    <input style={{flex:2}} value={p.caption} onChange={e => {
                                        const newP = [...form.photos];
                                        newP[i].caption = e.target.value;
                                        setForm(prev => ({...prev, photos: newP}));
                                    }} placeholder="Caption" />
                                </div>
                            ))}
                        </div>

                        {/* Videos Upload */}
                        <div className="form-group">
                            <label>Videos (Click to upload)</label>
                            <button type="button" onClick={() => uploadToCloudinary(addVideo)}>🎥 Upload Video</button>
                            <div>{preview.videos.map((url,i) => <span key={i} style={{margin:'5px'}}>✅ Video {i+1}</span>)}</div>
                            {form.videos.map((v,i) => (
                                <div key={i} style={{marginTop:'5px'}}>
                                    <input style={{width:'100%'}} value={v.title} onChange={e => {
                                        const newV = [...form.videos];
                                        newV[i].title = e.target.value;
                                        setForm(prev => ({...prev, videos: newV}));
                                    }} placeholder="Video Title" />
                                </div>
                            ))}
                        </div>

                        {/* Audios Upload */}
                        <div className="form-group">
                            <label>Countdown Audio (Upload MP3)</label>
                            <button type="button" onClick={() => uploadToCloudinary(url => setAudio(url, 'countdownAudio'))}>🎵 Upload Countdown Audio</button>
                            {form.countdownAudio && <span style={{marginLeft:'10px', color:'green'}}>✅ Uploaded</span>}
                        </div>
                        <div className="form-group">
                            <label>Birthday Wish Audio (Upload MP3)</label>
                            <button type="button" onClick={() => uploadToCloudinary(url => setAudio(url, 'wishAudio'))}>🎶 Upload Wish Audio</button>
                            {form.wishAudio && <span style={{marginLeft:'10px', color:'green'}}>✅ Uploaded</span>}
                        </div>

                        {/* Letter */}
                        <div className="form-group"><label>Love Letter</label><textarea name="letter" value={form.letter} onChange={handleChange} placeholder="Your heartfelt letter..." /></div>

                        {/* Secret Photo */}
                        <div className="form-group">
                            <label>Secret Photo</label>
                            <button type="button" onClick={() => uploadToCloudinary(setSecret)}>🖼️ Upload Secret Photo</button>
                            {preview.secretPhoto && <img src={preview.secretPhoto} className="upload-preview" style={{maxWidth:'100px'}} />}
                        </div>

                        <button className="submit-btn" onClick={handleSubmit} disabled={saving}>
                            {saving ? 'Creating your wish page...' : '✨ Create My Wish Page ✨'}
                        </button>
                    </div>
                </div>
            );
        }

        // ---------- Admin Panel ----------
        function AdminPanel() {
            const { navigate } = useContext(RouterContext);
            const [wishes, setWishes] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                db.collection('wishes').orderBy('createdAt','desc').get()
                    .then(snapshot => {
                        const data = [];
                        snapshot.forEach(doc => data.push({id: doc.id, ...doc.data()}));
                        setWishes(data);
                    })
                    .catch(err => alert('Error loading admin: ' + err.message))
                    .finally(() => setLoading(false));
            }, []);

            if (loading) return <div style={{padding:'50px', textAlign:'center'}}>Loading admin panel...</div>;

            return (
                <div style={{ padding: '20px', maxWidth: '1000px', margin: '0 auto' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom:'20px' }}>
                        <h1>📊 Admin Panel - All Wishes</h1>
                        <button className="logout-btn" onClick={() => navigate('/dashboard')}>Back to Dashboard</button>
                    </div>
                    <p>Total wishes: <strong>{wishes.length}</strong></p>
                    <table className="admin-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>For</th>
                                <th>Created By</th>
                                <th>Date</th>
                                <th>Link</th>
                            </tr>
                        </thead>
                        <tbody>
                            {wishes.map((w, i) => (
                                <tr key={w.id}>
                                    <td>{i+1}</td>
                                    <td>{w.birthdayName}</td>
                                    <td>{w.userEmail || 'Unknown'}</td>
                                    <td>{w.createdAt ? new Date(w.createdAt.seconds*1000).toLocaleDateString() : 'N/A'}</td>
                                    <td>
                                        <a href={`#/wish/${w.id}`} target="_blank" style={{color:'#ff69b4'}}>
                                            Open Wish 🔗
                                        </a>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    {wishes.length === 0 && <p style={{textAlign:'center', marginTop:'30px'}}>No wishes created yet.</p>}
                </div>
            );
        }

        // ---------- Wish Page (Public) ----------
        function WishPage({ wishId }) {
            const [wishData, setWishData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentStep, setCurrentStep] = useState('countdown');
            const countdownAudioRef = useRef(null);
            const wishAudioRef = useRef(null);
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

            useEffect(() => {
                startFloatingHearts();
                startFloatingElements();
            }, []);

            useEffect(() => {
                db.collection('wishes').doc(wishId).get()
                    .then(doc => { if (doc.exists) setWishData(doc.data()); else alert('Invalid wish page'); })
                    .catch(() => alert('Error loading'))
                    .finally(() => setLoading(false));
            }, [wishId]);

            useEffect(() => {
                if (!wishData) return;
                const timer = setInterval(() => {
                    const now = new Date();
                    const birthday = new Date(now.getFullYear(), wishData.month, wishData.day, wishData.hour, wishData.minute);
                    if (now >= birthday) { setCurrentStep('greeting'); clearInterval(timer); }
                }, 1000);
                return () => clearInterval(timer);
            }, [wishData]);

            useEffect(() => {
                if (currentStep === 'countdown' && wishData?.countdownAudio) {
                    if (countdownAudioRef.current) countdownAudioRef.current.pause();
                    countdownAudioRef.current = new Audio(wishData.countdownAudio);
                    countdownAudioRef.current.play().catch(() => {});
                }
                if (currentStep === 'greeting' && wishData?.wishAudio) {
                    if (wishAudioRef.current) wishAudioRef.current.pause();
                    wishAudioRef.current = new Audio(wishData.wishAudio);
                    wishAudioRef.current.play().catch(() => {});
                }
            }, [currentStep, wishData]);

            if (loading) return <div style={{textAlign:'center', marginTop:'100px'}}>Loading...</div>;
            if (!wishData) return <div style={{textAlign:'center', marginTop:'100px'}}>Page not found</div>;

            const openLightbox = (src) => {
                document.getElementById('lightboxImg').src = src;
                document.getElementById('lightbox').classList.add('show');
            };
            const closeLightbox = () => document.getElementById('lightbox').classList.remove('show');

            return (
                <div>
                    <ContactFloatingButton />
                    <div className="floating-elements"></div>
                    <div className="magic-sparkles"></div>
                    <div className="floating-hearts"></div>
                    <div id="lightbox" className="lightbox" onClick={closeLightbox}>
                        <span className="close">&times;</span><img id="lightboxImg" src="" alt="lightbox" />
                    </div>

                    {currentStep === 'countdown' && (
                        <CountdownContent wishData={wishData} months={months} />
                    )}
                    {currentStep === 'greeting' && (
                        <div className="greeting-screen show">
                            <h1>🎂 Happy Birthday {wishData.birthdayName} ❤️🎂💫</h1>
                            <p style={{fontSize:'1.3rem', margin:'20px'}}>{wishData.greetingText}</p>
                            <button className="enter-btn" onClick={() => setCurrentStep('cake')}>Click to enter your world 💕</button>
                        </div>
                    )}
                    {currentStep === 'cake' && <CakeScreen wishData={wishData} onNext={() => setCurrentStep('reasons')} />}
                    {currentStep === 'reasons' && <ReasonsScreen wishData={wishData} onNext={() => setCurrentStep('photo')} />}
                    {currentStep === 'photo' && <PhotoScreen wishData={wishData} openLightbox={openLightbox} onNext={() => setCurrentStep('video')} />}
                    {currentStep === 'video' && <VideoScreen wishData={wishData} onNext={() => setCurrentStep('letter')} />}
                    {currentStep === 'letter' && <LetterScreen wishData={wishData} onNext={() => setCurrentStep('secret')} />}
                    {currentStep === 'secret' && <SecretScreen wishData={wishData} openLightbox={openLightbox} />}
                </div>
            );
        }

        // Sub-components (simplified but functional)
        function CountdownContent({ wishData, months }) {
            const [time, setTime] = useState({ days:0, hours:0, mins:0, secs:0 });
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    const birthday = new Date(now.getFullYear(), wishData.month, wishData.day, wishData.hour, wishData.minute);
                    if (now >= birthday) return;
                    const diff = birthday - now;
                    setTime({
                        days: Math.floor(diff / (1000*60*60*24)),
                        hours: Math.floor((diff / (1000*60*60)) % 24),
                        mins: Math.floor((diff / (1000*60)) % 60),
                        secs: Math.floor((diff / 1000) % 60)
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, [wishData]);
            return (
                <div className="countdown-screen" style={{display:'flex'}}>
                    <h1 className="countdown-title">⏳ Wait for countdown...⌛</h1>
                    <div className="countdown-box">
                        <div className="count-item"><span className="count-number">{String(time.days).padStart(2,'0')}</span><span className="count-label">Days</span></div>
                        <div className="count-item"><span className="count-number">{String(time.hours).padStart(2,'0')}</span><span className="count-label">Hours</span></div>
                        <div className="count-item"><span className="count-number">{String(time.mins).padStart(2,'0')}</span><span className="count-label">Mins</span></div>
                        <div className="count-item"><span className="count-number">{String(time.secs).padStart(2,'0')}</span><span className="count-label">Secs</span></div>
                    </div>
                    <p style={{color:'white'}}>⏰ Time-lap at {wishData.day} {months[wishData.month]} {wishData.hour}:{String(wishData.minute).padStart(2,'0')}</p>
                </div>
            );
        }

        function CakeScreen({ wishData, onNext }) {
            const [cut, setCut] = useState(false);
            const [blown, setBlown] = useState(0);
            const total = wishData.age || 17;
            useEffect(() => {
                let interval;
                if (!cut) {
                    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const analyser = audioCtx.createAnalyser();
                        const source = audioCtx.createMediaStreamSource(stream);
                        source.connect(analyser);
                        analyser.fftSize = 256;
                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        interval = setInterval(() => {
                            if (cut || blown >= total) { clearInterval(interval); return; }
                            analyser.getByteFrequencyData(dataArray);
                            if (dataArray.reduce((a,b)=>a+b,0)/dataArray.length > 50) {
                                setBlown(prev => {
                                    const newB = Math.min(prev+2, total);
                                    if (newB === total && window.confetti) confetti({ particleCount:100, spread:70 });
                                    return newB;
                                });
                            }
                        }, 150);
                    }).catch(() => {});
                }
                return () => { if (interval) clearInterval(interval); };
            }, [cut, total]);
            const blowCandle = (i) => {
                if (!cut && i >= blown) {
                    setBlown(i+1);
                    if (window.confetti) confetti({ particleCount:5, spread:30 });
                }
            };
            return (
                <div className="cake-screen show">
                    <div className="cake-container">
                        <div className="cake-emoji">{cut ? '🍰' : '🎂'}</div>
                        <div className="candles">
                            {Array.from({length: total}).map((_, i) => (
                                <span key={i} className={`candle ${i < blown ? 'blown' : ''}`} onClick={() => blowCandle(i)}>🕯️</span>
                            ))}
                        </div>
                        <div className="cake-status">{cut ? '🎉 Cake cut! Happy Birthday! 🎉' : `${total-blown} candles burning - Blow or tap`}</div>
                        {!cut && <button className="cut-btn" disabled={blown !== total} onClick={() => { setCut(true); if (window.confetti) confetti({ particleCount:150, spread:80 }); }}>🍰 Cut Cake</button>}
                        {cut && <button className="cake-next-btn" onClick={onNext}>Enter your storyline 💫</button>}
                    </div>
                </div>
            );
        }

        function ReasonsScreen({ wishData, onNext }) {
            const [index, setIndex] = useState(0);
            const reasons = wishData.reasons?.filter(r => r.text.trim()) || [];
            useEffect(() => { if (!reasons.length) { setTimeout(onNext, 100); } }, []);
            if (!reasons.length) return null;
            const r = reasons[index] || reasons[0];
            return (
                <div className="reasons-screen show">
                    <h2 style={{fontFamily:'Bubblegum Sans', fontSize:'2.5rem', color:'#ff69b4'}}>❤️ Reasons Why ❤️</h2>
                    <div style={{background:'white', padding:'30px', borderRadius:'20px', margin:'20px', maxWidth:'500px', textAlign:'center'}}>
                        <div style={{fontSize:'3rem'}}>{r.emoji}</div>
                        <p style={{fontSize:'1.3rem', marginTop:'10px'}}>{r.text}</p>
                    </div>
                    <p>Reason {index+1} of {reasons.length}</p>
                    <button className="enter-btn" onClick={() => index < reasons.length-1 ? setIndex(index+1) : onNext()}>
                        {index === reasons.length-1 ? "🎉 See Memories 🎉" : "Next Reason 💕"}
                    </button>
                </div>
            );
        }

        function PhotoScreen({ wishData, openLightbox, onNext }) {
            return (
                <div className="photo-screen show">
                    <div className="photo-header"><h1>📸 Our Beautiful Moments Together</h1><p>Every moment with you is magical...</p></div>
                    <div className="photo-container">
                        {(wishData.photos || []).map((p, i) => (
                            <div key={i} className="photo-card" onClick={() => openLightbox(p.url)}>
                                <img src={p.url} className="photo-img" alt={p.date} />
                                <div className="photo-date">{p.date}</div>
                                <p>{p.caption}</p>
                            </div>
                        ))}
                    </div>
                    <button className="photo-next-btn" onClick={onNext}>🎥 Watch Videos 🎥</button>
                </div>
            );
        }

        function VideoScreen({ wishData, onNext }) {
            return (
                <div className="video-screen show">
                    <h2>🎬 A Special Video Message</h2>
                    <div className="video-container">
                        <div className="video-grid">
                            {(wishData.videos || []).map((v, i) => (
                                <div key={i} className="video-card">
                                    <h3>{v.title}</h3>
                                    <div className="video-wrapper">
                                        <video controls><source src={v.url} type="video/mp4" /></video>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button className="video-next-btn" onClick={onNext}>💌 Read Your Letter 💌</button>
                    </div>
                </div>
            );
        }

        function LetterScreen({ wishData, onNext }) {
            return (
                <div className="letter-screen show">
                    <div className="letter-container">
                        <h2>💌 A Letter for You 💌</h2>
                        <div className="letter-content">{wishData.letter}</div>
                        <button className="letter-return-btn" onClick={onNext}>🎁 Special Surprise 🎁</button>
                    </div>
                </div>
            );
        }

        function SecretScreen({ wishData, openLightbox }) {
            return (
                <div className="secret-screen show">
                    <div className="secret-container">
                        <img src={wishData.secretPhoto} className="secret-photo" onClick={() => openLightbox(wishData.secretPhoto)} alt="Secret" />
                        <h2 style={{marginTop:'20px', color:'#c71585'}}>With love, {wishData.birthdayName} ❤️</h2>
                        <button className="soulmate-btn" onClick={() => window.open(ADMIN_CONTACT.instagram, '_blank')}>
                            <i className="fab fa-instagram"></i> Created with Love
                        </button>
                    </div>
                </div>
            );
        }

        // ---------- App Router ----------
        function App() {
            const router = useHashRouter();
            return (
                <RouterContext.Provider value={router}>
                    <Route path="/" element={() => <LoginPage />} />
                    <Route path="/dashboard" element={() => <Dashboard />} />
                    <Route path="/admin" element={() => <AdminPanel />} />
                    <Route path="/wish/:wishId" element={(params) => <WishPage wishId={params.wishId} />} />
                </RouterContext.Provider>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (err) {
            document.getElementById('root').innerHTML = '<h1 style="color:red;text-align:center;margin-top:100px;">Error: ' + err.message + '</h1>';
        }
    </script>
</body>
</html>
