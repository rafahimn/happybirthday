                h.style.setProperty('--translate-x', (Math.random() * 60 - 30) + 'px');
                c.appendChild(h);
                setTimeout(() => h.remove(), 8000);
            }, 800);
        }

        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').classList.add('show');
        }
        window.closeLightbox = (e) => {
            if (e.target === document.getElementById('lightbox') || e.target.classList.contains('close'))
                document.getElementById('lightbox').classList.remove('show');
        };

        function uploadFile(cb) {
            window.cloudinary.openUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: CLOUDINARY_UPLOAD_PRESET,
                sources: ['local', 'url', 'camera'],
                multiple: false,
            }, (err, res) => {
                if (!err && res && res.event === 'success') cb(res.info.secure_url);
            });
        }

        function navigate(hash) {
            window.location.hash = hash;
        }

        function ContactButton() {
            const btn = document.createElement('div');
            btn.className = 'contact-float-btn';
            btn.innerHTML = `<button onclick="toggleContactPopup()"><i class="fas fa-comment"></i></button>`;
            const popup = document.createElement('div');
            popup.id = 'contactPopup';
            popup.style.cssText = 'display:none;position:fixed;bottom:80px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:20px;padding:20px;z-index:10000;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.2);';
            popup.innerHTML = `
                <p><b>Contact</b></p>
                <a href="${ADMIN_CONTACT.facebook}" target="_blank" style="display:block;margin:5px 0;"><i class="fab fa-facebook"></i> Facebook</a>
                <a href="${ADMIN_CONTACT.instagram}" target="_blank" style="display:block;margin:5px 0;"><i class="fab fa-instagram"></i> Instagram</a>
                <button onclick="toggleContactPopup()" style="margin-top:10px;padding:5px 15px;border-radius:15px;border:1px solid #ccc;background:white;cursor:pointer;">Close</button>
            `;
            document.body.appendChild(btn);
            document.body.appendChild(popup);
        }

        window.toggleContactPopup = function () {
            const p = document.getElementById('contactPopup');
            if (p) p.style.display = p.style.display === 'block' ? 'none' : 'block';
        };

        // ============== APP LOGIC ==============
        floatElements();
        floatHearts();
        ContactButton();

        function handleRoute() {
            const hash = window.location.hash.slice(1) || '/';
            const root = document.getElementById('root');

            if (hash === '/') {
                root.innerHTML = `
                    <video class="video-bg" autoplay muted loop playsinline>
                        <source src="https://assets.mixkit.co/videos/preview/mixkit-candles-in-the-dark-1327-large.mp4" type="video/mp4">
                    </video>
                    <div class="overlay"></div>
                    <div class="login-container">
                        <h1 style='color:white;margin-bottom:20px;'>Create Your Own Birthday Wish Page</h1>
                        <button class="login-btn" onclick="loginWithGoogle()">
                            <i class="fab fa-google"></i> Login with Google
                        </button>
                    </div>
                `;
            }
            else if (hash === '/dashboard') {
                if (!auth.currentUser) { navigate('/'); return; }
                root.innerHTML = `
                    <div style="padding:20px;max-width:800px;margin:0 auto;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <h1>Customize Your Wish Page</h1>
                            <div>
                                <button class="logout-btn" style="margin-right:10px;" onclick="navigate('/admin')">Admin</button>
                                <button class="logout-btn" onclick="logout()">Logout</button>
                            </div>
                        </div>
                        <div class="form-container">
                            ${formHTML()}
                            <button class="submit-btn" onclick="createWish()">✨ Create My Wish Page ✨</button>
                        </div>
                    </div>
                `;
                window._formData = {
                    birthdayName: '', month: 2, day: 15, hour: 0, minute: 0, age: 17,
                    greetingText: '', reasons: [{ text: '', emoji: '💖' }, { text: '', emoji: '💗' }, { text: '', emoji: '💕' }, { text: '', emoji: '🌟' }],
                    photos: [], videos: [], countdownAudio: '', wishAudio: '', letter: '', secretPhoto: ''
                };
            }
            else if (hash.startsWith('/wish/')) {
                const id = hash.split('/wish/')[1];
                db.collection('wishes').doc(id).get().then(doc => {
                    if (doc.exists) renderWish(doc.data());
                    else root.innerHTML = '<div style="text-align:center;margin-top:100px;">Wish not found</div>';
                });
            }
            else if (hash === '/admin') {
                root.innerHTML = `<div style="max-width:400px;margin:100px auto;text-align:center;">
                    <h2>Admin Login</h2>
                    <input id="adminPw" type="password" placeholder="Password" style="width:100%;padding:10px;border-radius:20px;border:1px solid #ccc;margin:10px 0;">
                    <button onclick="checkAdmin()" style="padding:10px 25px;background:#ff69b4;color:white;border:none;border-radius:20px;cursor:pointer;">Login</button>
                </div>`;
            }
        }

        function formHTML() {
            return `
                <div class="form-group"><label>Birthday Person's Name *</label><input id="fname" onchange="updateF('birthdayName',this.value)"></div>
                <div class="form-group"><label>Birth Date</label><input type="date" onchange="updateDate(this.value)"><input type="time" onchange="updateTime(this.value)"></div>
                <div class="form-group"><label>Age (Candles)</label><input type="number" value="17" onchange="updateF('age',parseInt(this.value)||17)"></div>
                <div class="form-group"><label>Greeting Message</label><textarea onchange="updateF('greetingText',this.value)"></textarea></div>
                <div class="form-group"><label>4 Reasons</label>${[0,1,2,3].map(i => `<div style="display:flex;gap:5px;margin-bottom:5px;"><input style="width:50px;" onchange="updateReason(${i},'emoji',this.value)"><input style="flex:1;" onchange="updateReason(${i},'text',this.value)"></div>`).join('')}</div>
                <div class="form-group"><label>Photos</label><button type="button" onclick="uploadFile(u => {window._formData.photos.push({url:u,date:'Memory',caption:''});refreshUploads();})">📸 Upload</button><div id="photoPreviews"></div></div>
                <div class="form-group"><label>Videos</label><button type="button" onclick="uploadFile(u => {window._formData.videos.push({url:u,title:'Video'});refreshUploads();})">🎥 Upload</button><div id="videoPreviews"></div></div>
                <div class="form-group"><label>Countdown Audio</label><button type="button" onclick="uploadFile(u => {window._formData.countdownAudio=u;refreshUploads();})">🎵 Upload</button></div>
                <div class="form-group"><label>Wish Audio</label><button type="button" onclick="uploadFile(u => {window._formData.wishAudio=u;refreshUploads();})">🎶 Upload</button></div>
                <div class="form-group"><label>Love Letter</label><textarea onchange="updateF('letter',this.value)"></textarea></div>
                <div class="form-group"><label>Secret Photo</label><button type="button" onclick="uploadFile(u => {window._formData.secretPhoto=u;refreshUploads();})">🖼️ Upload</button></div>
            `;
        }

        window.updateF = (key, val) => { window._formData[key] = val; };
        window.updateDate = (v) => { const d = new Date(v); window._formData.month = d.getMonth(); window._formData.day = d.getDate(); };
        window.updateTime = (v) => { const [h, m] = v.split(':'); window._formData.hour = parseInt(h) || 0; window._formData.minute = parseInt(m) || 0; };
        window.updateReason = (i, key, val) => { window._formData.reasons[i][key] = val; };
        window.refreshUploads = () => {
            const pp = document.getElementById('photoPreviews');
            const vp = document.getElementById('videoPreviews');
            if (pp) pp.innerHTML = window._formData.photos.map((p, i) => `<span>Photo ${i + 1} ✅</span>`).join(' ');
            if (vp) vp.innerHTML = window._formData.videos.map((v, i) => `<span>Video ${i + 1} ✅</span>`).join(' ');
        };

        window.loginWithGoogle = async () => {
            try {
                await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                navigate('/dashboard');
            } catch (e) { alert('Login failed: ' + e.message); }
        };

        window.logout = () => { auth.signOut(); navigate('/'); };

        window.createWish = async () => {
            const f = window._formData;
            if (!f.birthdayName.trim()) return alert('Enter name');
            try {
                const id = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
                await db.collection('wishes').doc(id).set({
                    ...f,
                    userId: auth.currentUser.uid,
                    userEmail: auth.currentUser.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('✅ Wish Created! Link: ' + window.location.origin + window.location.pathname + '#/wish/' + id);
                navigate('/wish/' + id);
            } catch (e) { alert('Error: ' + e.message); }
        };

        window.checkAdmin = () => {
            if (document.getElementById('adminPw').value === ADMIN_PASSWORD) {
                db.collection('wishes').orderBy('createdAt', 'desc').get().then(snap => {
                    const arr = [];
                    snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
                    let html = '<div style="padding:20px;"><h1>Admin Panel</h1><table class="admin-table"><tr><th>#</th><th>Name</th><th>By</th><th>Link</th></tr>';
                    arr.forEach((w, i) => html += `<tr><td>${i + 1}</td><td>${w.birthdayName}</td><td>${w.userEmail || '?'}</td><td><a href="#/wish/${w.id}" target="_blank">Open</a></td></tr>`);
                    html += '</table></div>';
                    document.getElementById('root').innerHTML = html;
                });
            } else alert('Wrong password');
        };

        function renderWish(data) {
            const root = document.getElementById('root');
            let step = 0;
            const screens = ['countdown', 'greeting', 'cake', 'reasons', 'photo', 'video', 'letter', 'secret'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

            function showScreen(n) {
                step = n;
                const s = screens[n];
                root.innerHTML = '';
                if (s === 'countdown') renderCountdown();
                else if (s === 'greeting') renderGreeting();
                else if (s === 'cake') renderCake();
                else if (s === 'reasons') renderReasons();
                else if (s === 'photo') renderPhotos();
                else if (s === 'video') renderVideos();
                else if (s === 'letter') renderLetter();
                else if (s === 'secret') renderSecret();
            }

            function renderCountdown() {
                root.innerHTML = `<div class="countdown-screen" style="display:flex;"><h1 class="countdown-title">⌛ Countdown...</h1><div class="countdown-box">${['Days','Hours','Mins','Secs'].map(l => `<div class="count-item"><span class="count-number" id="c${l}">00</span><span class="count-label">${l}</span></div>`).join('')}</div><div class="countdown-message">⏰ ${data.day} ${months[data.month]} ${data.hour}:${String(data.minute).padStart(2, '0')}</div></div>`;
                const int = setInterval(() => {
                    const now = new Date();
                    const bd = new Date(now.getFullYear(), data.month, data.day, data.hour, data.minute);
                    if (now >= bd) { clearInterval(int); showScreen(1); return; }
                    const diff = bd - now;
                    document.getElementById('cDays').textContent = String(Math.floor(diff / 86400000)).padStart(2, '0');
                    document.getElementById('cHours').textContent = String(Math.floor((diff / 3600000) % 24)).padStart(2, '0');
                    document.getElementById('cMins').textContent = String(Math.floor((diff / 60000) % 60)).padStart(2, '0');
                    document.getElementById('cSecs').textContent = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
                }, 1000);
            }

            function renderGreeting() {
                root.innerHTML = `<div class="greeting-screen show"><h1>Happy Birthday ${data.birthdayName} ❤️🎂💫</h1><div class="greeting-text">${data.greetingText}</div><button class="enter-btn" onclick="(${showScreen.toString()})(2)">Enter 💕</button></div>`;
                if (window.confetti) confetti({ particleCount: 100, spread: 70 });
            }

            function renderCake() {
                let cut = false, blown = 0;
                const total = data.age || 17;
                function draw() {
                    root.querySelector('.cake-container').innerHTML = `
                        <div class="cake-emoji">${cut ? '🍰' : '🎂'}</div>
                        <div class="candles">${Array.from({ length: total }).map((_, i) => `<span class="candle ${i < blown ? 'blown' : ''}" onclick="(${(i) => { if (!cut && i >= blown) { blown = i + 1; draw(); if (blown === total && window.confetti) confetti({ particleCount: 100, spread: 70 }); } }})(...)">🕯️</span>`).join('')}</div>
                        <div class="cake-status">${cut ? '🎉 Cake cut! 🎉' : `${total - blown} candles burning`}</div>
                        ${!cut ? `<button class="cut-btn" ${blown !== total ? 'disabled' : ''} onclick="(${() => { cut = true; draw(); if (window.confetti) confetti({ particleCount: 150, spread: 80 }); }})()">🍰 Cut Cake</button>` : `<button class="cake-next-btn" onclick="(${showScreen.toString()})(3)">Enter storyline 💫</button>`}
                    `;
                }
                root.innerHTML = `<div class="cake-screen show"><div class="cake-container"></div></div>`;
                draw();
            }

            function renderReasons() {
                let idx = 0;
                const reasons = data.reasons?.filter(r => r.text.trim()) || [{ text: 'You are amazing!', emoji: '💖' }];
                function draw() {
                    const r = reasons[idx];
                    root.innerHTML = `<div class="reasons-screen show">
                        <div class="reasons-header"><h1>Happy Birthday ${data.birthdayName}.. 💖</h1></div>
                        <div class="reasons-container"><div class="reason-card"><div class="reason-text">${r.emoji} ${r.text}</div><div class="reason-emoji">${r.emoji}</div></div></div>
                        <div class="reason-counter">Reason ${idx + 1} of ${reasons.length}</div>
                        <button class="reasons-btn ${idx === reasons.length - 1 ? 'story-mode' : ''}" onclick="(${(n) => { if (n === reasons.length - 1) showScreen(4); else { idx = n + 1; draw(); } }})(...)">${idx === reasons.length - 1 ? "You're the BESTEST ! 💖" : "Click Here... 💕"}</button>
                    </div>`;
                }
                draw();
            }

            function renderPhotos() {
                root.innerHTML = `<div class="photo-screen show">
                    <div class="photo-header"><h1>Our Beautiful Moments Together</h1></div>
                    <div class="photo-container">${(data.photos || []).map(p => `<div class="photo-card" onclick="openLightbox('${p.url}')"><img src="${p.url}" class="photo-img"><div class="photo-date">${p.date}</div><div class="photo-caption">${p.caption}</div></div>`).join('')}</div>
                    <button class="photo-next-btn" onclick="(${showScreen.toString()})(5)">Again Your Storylane 🎥</button>
                </div>`;
            }

            function renderVideos() {
                root.innerHTML = `<div class="video-screen show">
                    <h2>A Special Video Message</h2>
                    <div class="video-container"><div class="video-grid">${(data.videos || []).map(v => `<div class="video-card"><h3>${v.title}</h3><div class="video-wrapper"><video controls><source src="${v.url}" type="video/mp4"></video></div></div>`).join('')}</div>
                    <button class="video-next-btn" onclick="(${showScreen.toString()})(6)">See your letter 💌</button></div>
                </div>`;
            }

            function renderLetter() {
                root.innerHTML = `<div class="letter-screen show"><div class="letter-container"><h2>A Letter for You Babiee 💌</h2><div class="letter-content">${data.letter}</div><button class="letter-return-btn" onclick="(${showScreen.toString()})(7)">Again,Happy Birthday My Honey</button></div></div>`;
            }

            function renderSecret() {
                root.innerHTML = `<div class="secret-screen show"><div class="secret-container"><img src="${data.secretPhoto}" class="secret-photo" onclick="openLightbox('${data.secretPhoto}')"><button class="soulmate-btn" onclick="window.open('${ADMIN_CONTACT.instagram}', '_blank')"><i class="fab fa-instagram"></i> See Your Soulmate</button></div></div>`;
            }

            showScreen(0);
        }

        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', handleRoute);
    </script>
</body>
</html>
