<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wish Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Dancing+Script&family=Quicksand&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);min-height:100vh}
        .container{max-width:600px;margin:0 auto;padding:20px}
        .card{background:white;border-radius:20px;padding:30px;box-shadow:0 15px 35px rgba(0,0,0,0.2)}
        h1{font-family:'Bubblegum Sans',cursive;color:#d4145a;text-align:center;margin-bottom:20px}
        input,textarea{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:15px;font-size:16px}
        button{width:100%;padding:14px;background:linear-gradient(45deg,#ff69b4,#ff99cc);color:white;border:none;border-radius:30px;font-size:18px;cursor:pointer;margin:8px 0}
        .btn-sm{padding:8px 15px;font-size:14px;width:auto;display:inline-block}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th{background:#ff69b4;color:white;padding:10px}
        td{padding:10px;border-bottom:1px solid #ddd}
        a{color:#ff69b4}
        .contact-btn{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#a18cd1,#fbc2eb);border:2px solid white;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:9999;box-shadow:0 5px 20px rgba(147,112,219,0.4)}
        .contact-btn i{color:#4a4a4a;font-size:20px}
        .contact-popup{position:fixed;bottom:80px;right:20px;background:white;padding:20px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.2);display:none;z-index:10000}
        .wish-box{background:#fff0f5;padding:20px;border-radius:15px;margin:10px 0}
    </style>
</head>
<body>
    <div id="app" class="container"></div>
    <div class="contact-btn" onclick="toggleContact()"><i class="fas fa-comment"></i></div>
    <div class="contact-popup" id="contactPopup">
        <p><b>Contact</b></p>
        <a href="https://www.facebook.com/rafahimn" target="_blank"><i class="fab fa-facebook"></i> Facebook</a><br>
        <a href="https://www.instagram.com/rafahimn" target="_blank"><i class="fab fa-instagram"></i> Instagram</a><br>
        <button class="btn-sm" onclick="toggleContact()" style="background:#ccc;margin-top:8px;">Close</button>
    </div>

    <script>
        // ===== FIREBASE CONFIG =====
        firebase.initializeApp({
            apiKey: "AIzaSyC18r8GPtooLmUBnOGRBQUIKOodPvHRX8o",
            authDomain: "birthday-website-33f71.firebaseapp.com",
            projectId: "birthday-website-33f71",
            storageBucket: "birthday-website-33f71.firebasestorage.app",
            messagingSenderId: "800374135757",
            appId: "1:800374135757:web:2b4a058f708972e3e10284"
        });
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ===== GLOBAL STATE =====
        let currentUser = null;
        let formData = { birthdayName:'', month:2, day:15, hour:0, minute:0, age:17, greeting:'', reasons:['','','',''], photos:[], videos:[], audio:'', wishAudio:'', letter:'', secret:'' };

        // ===== HELPERS =====
        function $(id) { return document.getElementById(id); }
        function toggleContact() { const p = $('contactPopup'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
        function uploadFile(cb) {
            window.cloudinary.openUploadWidget({
                cloudName: "dpctt0wao",
                uploadPreset: "birthday_upload",
                sources: ['local','url','camera'],
                multiple: false
            }, (err, res) => { if (!err && res?.event === 'success') cb(res.info.secure_url); });
        }

        // ===== AUTH =====
        auth.onAuthStateChanged(user => {
            currentUser = user;
            render();
        });

        // ===== ROUTING =====
        function render() {
            const hash = window.location.hash.slice(1);
            const app = $('app');
            if (hash.startsWith('wish/')) showWish(hash.split('wish/')[1]);
            else if (hash === 'admin') showAdmin();
            else if (currentUser) showDashboard();
            else showLogin();
        }

        window.addEventListener('hashchange', render);
        window.addEventListener('load', render);

        function showLogin() {
            $('app').innerHTML = `
                <div class="card" style="text-align:center;margin-top:50px;">
                    <h1>🎂 Create Birthday Wish</h1>
                    <p style="margin:15px 0;">Login with Google to get started</p>
                    <button onclick="auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert(e.message))">
                        <i class="fab fa-google"></i> Login with Google
                    </button>
                </div>
            `;
        }

        function showDashboard() {
            let html = `<div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h1>Create Wish Page</h1>
                    <div>
                        <button class="btn-sm" onclick="window.location.hash='admin'">Admin</button>
                        <button class="btn-sm" onclick="auth.signOut()" style="background:#ccc;">Logout</button>
                    </div>
                </div>
                <input id="fname" placeholder="Birthday Person Name *" onchange="formData.birthdayName=this.value">
                <input id="fdate" type="date" onchange="const d=new Date(this.value);formData.month=d.getMonth();formData.day=d.getDate()">
                <input id="ftime" type="time" value="00:00" onchange="const [h,m]=this.value.split(':');formData.hour=+h;formData.minute=+m">
                <input id="fage" type="number" value="17" placeholder="Age" onchange="formData.age=+this.value">
                <textarea id="fgreeting" placeholder="Greeting Message" onchange="formData.greeting=this.value"></textarea>
                <p><b>4 Reasons:</b></p>`;
            [0,1,2,3].forEach(i => html += `<input placeholder="Reason ${i+1}" onchange="formData.reasons[${i}]=this.value">`);
            html += `
                <p><b>Photos:</b> <button class="btn-sm" onclick="uploadFile(url=>{formData.photos.push(url);$('ppreview').innerHTML+= '<span>✅ </span>'})">📸 Upload</button> <span id="ppreview"></span></p>
                <p><b>Videos:</b> <button class="btn-sm" onclick="uploadFile(url=>{formData.videos.push(url);$('vpreview').innerHTML+='<span>✅ </span>'})">🎥 Upload</button> <span id="vpreview"></span></p>
                <p><b>Countdown Audio:</b> <button class="btn-sm" onclick="uploadFile(url=>{formData.audio=url;$('apreview').innerHTML='✅'})">🎵 Upload</button> <span id="apreview"></span></p>
                <p><b>Wish Audio:</b> <button class="btn-sm" onclick="uploadFile(url=>{formData.wishAudio=url;$('wapreview').innerHTML='✅'})">🎶 Upload</button> <span id="wapreview"></span></p>
                <textarea id="fletter" placeholder="Love Letter" onchange="formData.letter=this.value"></textarea>
                <p><b>Secret Photo:</b> <button class="btn-sm" onclick="uploadFile(url=>{formData.secret=url;$('spreview').innerHTML='✅'})">🖼️ Upload</button> <span id="spreview"></span></p>
                <button onclick="createWish()">✨ Create My Wish Page ✨</button>
            </div>`;
            $('app').innerHTML = html;
        }

        async function createWish() {
            if (!formData.birthdayName.trim()) return alert('Enter name!');
            try {
                const id = Date.now().toString(36) + Math.random().toString(36).substr(2,5);
                await db.collection('wishes').doc(id).set({
                    ...formData,
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('✅ Created! Link: ' + window.location.origin + window.location.pathname + '#wish/' + id);
                window.location.hash = 'wish/' + id;
            } catch(e) { alert('Error: ' + e.message); }
        }

        async function showWish(id) {
            const doc = await db.collection('wishes').doc(id).get();
            if (!doc.exists) { $('app').innerHTML = '<div class="card"><h1>Not Found</h1></div>'; return; }
            const d = doc.data();
            let html = `<div class="card" style="text-align:center;">
                <h1>🎂 Happy Birthday ${d.birthdayName} ❤️</h1>
                <p>${d.greeting || ''}</p>`;
            if (d.photos?.length) {
                html += '<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:15px 0;">';
                d.photos.forEach(p => html += `<img src="${p}" style="width:150px;height:150px;object-fit:cover;border-radius:10px;">`);
                html += '</div>';
            }
            if (d.videos?.length) d.videos.forEach(v => html += `<video controls style="width:100%;max-width:400px;margin:10px;border-radius:10px;"><source src="${v}"></video>`);
            if (d.audio) html += `<audio controls style="width:100%;max-width:400px;margin:10px;"><source src="${d.audio}"></audio>`;
            if (d.wishAudio) html += `<audio controls style="width:100%;max-width:400px;margin:10px;"><source src="${d.wishAudio}"></audio>`;
            if (d.reasons?.filter(r=>r.trim()).length) {
                html += '<div class="wish-box"><h3>💖 Reasons Why 💖</h3><ul>';
                d.reasons.filter(r=>r.trim()).forEach(r => html += `<li>${r}</li>`);
                html += '</ul></div>';
            }
            if (d.letter) html += `<div class="wish-box" style="white-space:pre-line;">${d.letter}</div>`;
            if (d.secret) html += `<img src="${d.secret}" style="width:100%;max-width:300px;border-radius:10px;margin:10px;">`;
            html += `<a href="#"><button>Create Your Own</button></a></div>`;
            $('app').innerHTML = html;
        }

        async function showAdmin() {
            const pw = prompt("Admin Password:");
            if (pw !== "admin123") { window.location.hash = ''; return; }
            const snap = await db.collection('wishes').orderBy('createdAt','desc').get();
            const wishes = [];
            snap.forEach(d => wishes.push({id:d.id,...d.data()}));
            let html = `<div class="card"><h1>Admin Panel</h1><p>Total: ${wishes.length}</p>
                <table><tr><th>#</th><th>Name</th><th>By</th><th>Link</th></tr>`;
            wishes.forEach((w,i) => html += `<tr><td>${i+1}</td><td>${w.birthdayName}</td><td>${w.userEmail||'?'}</td><td><a href="#wish/${w.id}" target="_blank">Open</a></td></tr>`);
            html += '</table><br><a href="#"><button>Create New</button></a></div>';
            $('app').innerHTML = html;
        }
    </script>
</body>
</html>
